name: Build & Push ARM64 Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:        # allow manual trigger from the GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU (needed to emulate arm64 on the x86 runner) ───────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ── 3. Set up Docker Buildx ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to GitHub Container Registry ──────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Extract metadata (tags & labels) ──────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            # always keep a 'latest' on main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── 6. Build & push (linux/arm64 only) ───────────────────────────────
      #   Remove '--platform linux/amd64' entry below if you only need ARM64.
      #   Add it back if you want a multi-arch image that also runs on x86.
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in the GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            FOCALBOARD_TAG=v7.1.0
            FOCALBOARD_DOCKER_TAG=7.1.0
